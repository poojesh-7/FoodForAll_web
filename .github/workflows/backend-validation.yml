name: Backend Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Food_waste_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Food_waste_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run architecture validation
        run: npm run architecture:validate

      - name: Run tests
        run: npm test