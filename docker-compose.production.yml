services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-food_rescue}
      POSTGRES_USER: ${POSTGRES_USER:-food_rescue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.production.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - app_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./Food_waste_backend
      dockerfile: Dockerfile
    env_file:
      - ${DEPLOY_ENV_FILE:-./.env.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_internal
    restart: "no"
    command: ["npm", "run", "migrate"]

  api:
    build:
      context: ./Food_waste_backend
      dockerfile: Dockerfile
    env_file:
      - ${DEPLOY_ENV_FILE:-./.env.production}
    restart: unless-stopped
    stop_grace_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["sh", "-c", "npm run migrate:verify && npm run start"]
    expose:
      - "5000"
    networks:
      - app_internal

  worker:
    build:
      context: ./Food_waste_backend
      dockerfile: Dockerfile.worker
    env_file:
      - ${DEPLOY_ENV_FILE:-./.env.production}
    restart: unless-stopped
    stop_grace_period: 90s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["sh", "-c", "npm run migrate:verify && npm run workers:start"]
    networks:
      - app_internal

  frontend:
    build:
      context: .
      dockerfile: ./food-waste-frontend/Dockerfile
      args:
        NEXT_PUBLIC_APP_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_CASHFREE_MODE: ${NEXT_PUBLIC_CASHFREE_MODE:-production}
        API_PROXY_TARGET: ${API_PROXY_TARGET:-}
    environment:
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_CASHFREE_MODE: ${NEXT_PUBLIC_CASHFREE_MODE:-production}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - app_internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - ./infra/nginx/acme:/var/www/certbot:ro
    networks:
      - edge
      - app_internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${DEPLOY_ENV_FILE:-./.env.production}
    environment:
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_VERIFY: ${BACKUP_VERIFY:-true}
    volumes:
      - ./infra/backup:/backup
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/backup/postgres-backup.sh"]
    networks:
      - app_internal

volumes:
  postgres_data:
  redis_data:

networks:
  edge:
  app_internal:
    internal: true
