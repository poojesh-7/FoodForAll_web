server_tokens off;

log_format food_rescue_json escape=json
  '{"time":"$time_iso8601",'
  '"remote_addr":"$remote_addr",'
  '"request_id":"$request_id",'
  '"host":"$host",'
  '"method":"$request_method",'
  '"uri":"$request_uri",'
  '"status":$status,'
  '"bytes_sent":$bytes_sent,'
  '"request_time":$request_time,'
  '"upstream_addr":"$upstream_addr",'
  '"upstream_status":"$upstream_status",'
  '"upstream_response_time":"$upstream_response_time",'
  '"referer":"$http_referer",'
  '"user_agent":"$http_user_agent"}';

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

map $request_uri $edge_cache_control {
  default "";
  ~^/(api|admin/queues|health)(/|$) "no-store";
  ~^/_next/static/ "public, max-age=31536000, immutable";
  ~^/leaflet/ "public, max-age=2592000";
}

limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhook_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

upstream food_rescue_api {
  server api:5000 max_fails=3 fail_timeout=30s;
  keepalive 64;
}

upstream food_rescue_frontend {
  server frontend:3000 max_fails=3 fail_timeout=30s;
  keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  access_log /var/log/nginx/access.log food_rescue_json;

  location = /nginx-health {
    access_log off;
    return 204;
  }

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 308 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name _;

  access_log /var/log/nginx/access.log food_rescue_json;
  error_log /var/log/nginx/error.log warn;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256";
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:20m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_ecdh_curve X25519:secp384r1;

  # Cloudflare real IP ranges. Keep this list current when Cloudflare changes
  # their published ranges, or remove it when Nginx is the public edge.
  real_ip_header CF-Connecting-IP;
  real_ip_recursive on;
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 131.0.72.0/22;
  set_real_ip_from 2400:cb00::/32;
  set_real_ip_from 2606:4700::/32;
  set_real_ip_from 2803:f800::/32;
  set_real_ip_from 2405:b500::/32;
  set_real_ip_from 2405:8100::/32;
  set_real_ip_from 2a06:98c0::/29;
  set_real_ip_from 2c0f:f248::/32;

  client_max_body_size 6m;
  client_body_buffer_size 256k;
  client_body_timeout 15s;
  client_header_timeout 15s;
  keepalive_timeout 65s;
  send_timeout 30s;
  large_client_header_buffers 4 16k;
  limit_req_status 429;
  limit_conn_status 429;
  limit_conn conn_per_ip 100;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2;

  # Enable only when the deployed Nginx image includes ngx_brotli.
  # brotli on;
  # brotli_comp_level 5;
  # brotli_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml font/woff2;

  proxy_hide_header Strict-Transport-Security;
  proxy_hide_header X-Frame-Options;
  proxy_hide_header X-Content-Type-Options;
  proxy_hide_header X-XSS-Protection;
  proxy_hide_header Referrer-Policy;
  proxy_hide_header Permissions-Policy;
  proxy_hide_header Content-Security-Policy;
  proxy_hide_header X-Powered-By;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://*.cashfree.com https://cashfree.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://sdk.cashfree.com https://*.cashfree.com https://cashfree.com; connect-src 'self' https: wss:; frame-src 'self' https://*.cashfree.com https://cashfree.com; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;
  add_header Cache-Control $edge_cache_control always;

  location = /nginx-health {
    access_log off;
    return 204;
  }

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location ^~ /socket.io/ {
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_connect_timeout 10s;
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;
  }

  location = /api/v1/payments/webhook {
    limit_req zone=webhook_per_ip burst=60 nodelay;
    client_max_body_size 1m;
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_buffering off;
    proxy_request_buffering on;
  }

  location ^~ /api/v1/auth/ {
    limit_req zone=auth_per_ip burst=10 nodelay;
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }

  location /api/ {
    limit_req zone=api_per_ip burst=80 nodelay;
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }

  location ^~ /admin/queues/ {
    limit_req zone=api_per_ip burst=30 nodelay;
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }

  location = /health {
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location ^~ /health/ {
    proxy_pass http://food_rescue_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location ^~ /_next/static/ {
    proxy_pass http://food_rescue_frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location ^~ /leaflet/ {
    proxy_pass http://food_rescue_frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  location / {
    proxy_pass http://food_rescue_frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-Id $request_id;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;
  }
}
